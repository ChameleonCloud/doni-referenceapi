[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "doni_referenceapi"
requires-python = ">=3.8"
dependencies = [
    "python-doniclient",
    "python-ironicclient",
    "python-ironic-inspector-client",
    "pydantic",
]
dynamic = ["version"]

[project.optional-dependencies]
dev = ["black", "isort", "flake8"]
